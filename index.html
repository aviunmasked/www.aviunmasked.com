<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avi Unmasked Home</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
 <nav> 
    <div class="nav-left profile">
    <img src="Avi Unmasked.jpeg" alt="profile">
    <div>
      <div class="username">@avi-unmasked</div>
      <div style="font-size:12px;opacity:.8">Arvind Godara</div>
    </div>
  </div>
    <div class="nav-right">
    <div class="nav-links" style="display:flex;align-items:center">
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
    </div>
     <div class="clock" id="clock">--:--:--</div>
    <button class="mode-btn" aria-label="Toggle theme" onclick="toggleTheme()" title="Toggle theme">🌙</button>
  </div>
  </nav>
<main>
<section id="main" class="hero">
    <div class="right">
         <h1> Let’s not just get information… let’s uncover the real truth — with<span id="type"> Avi Unmasked. </span></h1>
        <p style="margin-top:12px;max-width:520px;line-height:1.5">
            Welcome to your personal brand hub. Grow your audience, collaborate with brands,
      and showcase your content like a pro.
        </p>
        <a href="login.html">
            <button class="start-btn">Get Started &#8594; </button>
        </a>
    </div>

    <div class="left">
        <img src="Avi Unmasked.jpeg" alt="image">
    </div>
</section>
</main>
<script>
 (function startClock(){
  const el = document.getElementById('clock');
  function pad(n){ return n < 10 ? '0'+n : n }
  function tick(){
    const d = new Date();
    const time = `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    const date = d.toLocaleDateString(undefined, {weekday:'short', day:'numeric', month:'short'});
    el.textContent = time + ' • ' + date;
  }
  tick(); setInterval(tick,1000);
})();
(function themeInit(){
  const body = document.body;
  const saved = localStorage.getItem('site-theme');
  if(saved === 'dark') body.classList.add('dark');
  window.toggleTheme = () => {
    body.classList.toggle('dark');
    localStorage.setItem('site-theme', body.classList.contains('dark') ? 'dark' : 'light');
    document.querySelector('.mode-btn').textContent = body.classList.contains('dark') ? '☀️' : '🌙';
  };
  document.querySelector('.mode-btn').textContent = body.classList.contains('dark') ? '☀️' : '🌙';
})();
</script>
</body>
</html>
